    <rect x="24" y="12" width="7" height="7"/><rect x="60" y="12" width="7" height="7"/>
    <rect x="72" y="0" width="7" height="7"/><rect x="84" y="0" width="7" height="7"/><rect x="96" y="24" width="7" height="7"/>
    <rect x="24" y="24" width="7" height="7"/><rect x="36" y="24" width="7" height="7"/>
    <rect x="48" y="36" width="7" height="7"/><rect x="60" y="36" width="7" height="7"/>
